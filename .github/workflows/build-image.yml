name: Build Production Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Resolve image coordinates
        id: vars
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short HEAD)"
          build_date="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "owner_lc=${owner_lc}" >> "$GITHUB_OUTPUT"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "build_date=${build_date}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/deer-flow-backend:sha-${{ steps.vars.outputs.sha }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/deer-flow-backend:sha-${{ steps.vars.outputs.short_sha }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/deer-flow-backend:main
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.vars.outputs.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.short_sha }}
            org.opencontainers.image.created=${{ steps.vars.outputs.build_date }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          target: prod
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/deer-flow-frontend:sha-${{ steps.vars.outputs.sha }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/deer-flow-frontend:sha-${{ steps.vars.outputs.short_sha }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/deer-flow-frontend:main
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.vars.outputs.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.short_sha }}
            org.opencontainers.image.created=${{ steps.vars.outputs.build_date }}
