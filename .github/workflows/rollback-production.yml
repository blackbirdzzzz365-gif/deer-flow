name: Roll Back Production

on:
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: Optional SHA to roll back to. Leave empty to use the recorded previous release.
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  rollback:
    runs-on:
      - self-hosted
      - linux
      - ${{ vars.PRODUCTION_RUNNER_LABEL || 'compute-primary' }}
    environment: production
    timeout-minutes: 45

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Validate production variables
        env:
          PRODUCTION_APP_DIR: ${{ vars.PRODUCTION_APP_DIR }}
        run: |
          : "${PRODUCTION_APP_DIR:?Set PRODUCTION_APP_DIR in the production environment variables.}"

      - name: Sync deploy assets to production app dir
        env:
          PRODUCTION_APP_DIR: ${{ vars.PRODUCTION_APP_DIR }}
        run: |
          mkdir -p "${PRODUCTION_APP_DIR}"
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'backend/.venv' \
            --exclude 'frontend/node_modules' \
            --exclude '.env' \
            --exclude '.deploy' \
            ./ "${PRODUCTION_APP_DIR}/"

      - name: Roll back on production host
        env:
          ROLLBACK_SHA: ${{ inputs.rollback_sha }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRODUCTION_APP_DIR: ${{ vars.PRODUCTION_APP_DIR }}
        run: |
          cd "${PRODUCTION_APP_DIR}"
          printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
          chmod +x scripts/*.sh
          APP_DIR="${PRODUCTION_APP_DIR}" \
          ROLLBACK_SHA="${ROLLBACK_SHA}" \
          GHCR_USERNAME="${GHCR_USERNAME}" \
          GHCR_TOKEN="${GHCR_TOKEN}" \
          scripts/rollback_production.sh
